<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Radhika | A Celebration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { --soft-pink: #fff5f5; --rose-gold: #e7a3a3; --deep-rose: #88304e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--soft-pink); color: #2d2d2d; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .cursive { font-family: 'Dancing Script', cursive; }

        .bg-mesh {
            background-color: #fff5f5;
            background-image: 
                radial-gradient(at 0% 0%, hsla(343,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(330,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(343,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(330,100%,95%,1) 0, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .sticker {
            position: absolute;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(136, 48, 78, 0.1));
            z-index: 5;
        }

        .section { height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rose-gold); transition: all 0.3s; }
        .nav-dot.active { width: 24px; border-radius: 10px; background: var(--deep-rose); }
    </style>
</head>
<body class="bg-mesh">

    <!-- NAVIGATION -->
    <div class="fixed right-8 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-4">
        <div class="nav-dot active" data-sec="home"></div>
        <div class="nav-dot" data-sec="countdown"></div>
        <div class="nav-dot" data-sec="gallery"></div>
        <div class="nav-dot" data-sec="letter"></div>
    </div>

    <!-- PAGE 1: HERO -->
    <section id="home" class="section overflow-hidden">
        <!-- Emoji Fountain Container -->
        <div id="fountain-container" class="absolute inset-0 z-0"></div>
        
        <div class="text-center z-10 relative">
            <p class="uppercase tracking-[0.4em] text-[10px] mb-6 text-rose-700/60 font-bold opacity-0" id="hero-tag">A Special Edition For</p>
            <h1 class="serif text-7xl md:text-[130px] leading-tight mb-4 opacity-0" id="hero-title">
                Happy <br> <span class="italic text-rose-500">Birthday</span>
            </h1>
            <div class="h-[1px] w-0 bg-rose-300 mx-auto mb-8" id="hero-line"></div>
            <p class="cursive text-5xl text-rose-400 opacity-0" id="hero-name">Radhika</p>
        </div>
    </section>

    <!-- PAGE 2: COUNTDOWN -->
    <section id="countdown" class="section px-4">
        <div class="glass-card p-12 md:p-20 rounded-[50px] max-w-4xl w-full text-center relative">
            <!-- Floating stickers around the card -->
            <div class="absolute -top-10 -left-10 text-6xl opacity-40">🎈</div>
            <div class="absolute -bottom-10 -right-10 text-6xl opacity-40">🎁</div>

            <h2 class="serif text-4xl md:text-5xl mb-12 italic text-rose-900/70">The magic begins in...</h2>
            <div id="timer" class="grid grid-cols-4 gap-4 md:gap-12 max-w-2xl mx-auto">
                <div class="flex flex-col"><span id="days" class="serif text-5xl md:text-7xl font-light">00</span><span class="text-[10px] uppercase tracking-widest mt-4 font-bold text-rose-400">Days</span></div>
                <div class="flex flex-col"><span id="hours" class="serif text-5xl md:text-7xl font-light">00</span><span class="text-[10px] uppercase tracking-widest mt-4 font-bold text-rose-400">Hours</span></div>
                <div class="flex flex-col"><span id="minutes" class="serif text-5xl md:text-7xl font-light">00</span><span class="text-[10px] uppercase tracking-widest mt-4 font-bold text-rose-400">Mins</span></div>
                <div class="flex flex-col"><span id="seconds" class="serif text-5xl md:text-7xl font-light">00</span><span class="text-[10px] uppercase tracking-widest mt-4 font-bold text-rose-400">Secs</span></div>
            </div>
        </div>
    </section>

    <!-- PAGE 3: GALLERY (Keep your images here) -->
    <section id="gallery" class="section h-auto py-32 px-4">
        <div class="max-w-6xl mx-auto w-full">
            <h2 class="serif text-6xl italic text-center mb-20 text-rose-900/80">Moments ✨</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <div class="aspect-[3/4] bg-white p-3 shadow-2xl rotate-[-2deg] hover:rotate-0 transition-all duration-500 rounded-sm">
                    <img src="images/pic1.jpg" class="w-full h-full object-cover rounded-sm" alt="Radhika">
                </div>
                <div class="aspect-[3/4] bg-white p-3 shadow-2xl rotate-[3deg] hover:rotate-0 transition-all duration-500 rounded-sm md:translate-y-12">
                    <img src="images/pic2.jpg" class="w-full h-full object-cover rounded-sm" alt="Radhika">
                </div>
                <div class="aspect-[3/4] bg-white p-3 shadow-2xl rotate-[-1deg] hover:rotate-0 transition-all duration-500 rounded-sm">
                    <img src="images/pic3.jpg" class="w-full h-full object-cover rounded-sm" alt="Radhika">
                </div>
            </div>
        </div>
    </section>

    <!-- PAGE 4: LETTER -->
    <section id="letter" class="section px-4 overflow-hidden">
        <div class="max-w-2xl text-center relative">
            <div class="sticker text-5xl top-[-100px] left-1/2 -translate-x-1/2 opacity-20">🕯️</div>
            <div class="cursive text-5xl text-rose-500 mb-12">Dear Radhika,</div>
            <p class="serif text-2xl md:text-3xl leading-relaxed text-rose-950 italic">
                "May your day be as sparkling as your smile and as beautiful as your heart."
            </p>
            <div class="mt-20">
                <p class="cursive text-4xl text-rose-400">Forever Yours ❤️</p>
            </div>
        </div>
    </section>

    <script>
        // 1. UPSCALE STICKER FOUNTAIN
        const emojis = ['✨', '💖', '🌸', '🥂', '🎂', '🕯️', '🎈', '🍰'];
        
        function createSticker(x, y, isFountain = false) {
            const el = document.createElement('div');
            el.className = 'sticker';
            el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(el);

            if (isFountain) {
                // Popping out from center
                gsap.to(el, {
                    x: (Math.random() - 0.5) * 600,
                    y: (Math.random() - 0.5) * 600,
                    rotation: Math.random() * 720,
                    opacity: 0,
                    scale: 0.5,
                    duration: 3 + Math.random() * 2,
                    ease: "power2.out",
                    onComplete: () => el.remove()
                });
            } else {
                // Drifting background
                gsap.to(el, {
                    y: '-110vh',
                    x: '+=' + (Math.random() - 0.5) * 200,
                    rotation: Math.random() * 360,
                    duration: 10 + Math.random() * 10,
                    opacity: 0,
                    ease: "none",
                    onComplete: () => el.remove()
                });
            }
        }

        // Initial Reveal Animation
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#hero-tag", { opacity: 1, y: 0, duration: 1 })
              .to("#hero-title", { opacity: 1, y: 0, duration: 1.5, ease: "back.out(1.7)" }, "-=0.5")
              .to("#hero-line", { width: 100, duration: 1 }, "-=1")
              .to("#hero-name", { opacity: 1, duration: 1.5 }, "-=0.5");

            // Trigger fountain once at start
            for(let i=0; i<20; i++) {
                setTimeout(() => createSticker(window.innerWidth/2, window.innerHeight/2, true), i * 100);
            }
        });

        // Background Drift
        setInterval(() => createSticker(Math.random() * window.innerWidth, window.innerHeight + 50), 800);

        // 2. COUNTDOWN (Update this date!)
        const target = new Date("2024-05-20T00:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const d = target - now;
            if (d < 0) return;
            document.getElementById("days").innerText = Math.floor(d / 86400000).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((d % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((d % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((d % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(update, 1000);

        // 3. NAV DOTS
        window.addEventListener('scroll', () => {
            const sections = ['home', 'countdown', 'gallery', 'letter'];
            let current = "";
            sections.forEach(s => {
                if (pageYOffset >= document.getElementById(s).offsetTop - 300) current = s;
            });
            document.querySelectorAll('.nav-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.sec === current);
            });
        });
    </script>
</body>
</html>
