<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Radhika! ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .cursive { font-family: 'Dancing Script', cursive; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .heart { position: fixed; color: #ff4d6d; pointer-events: none; z-index: 50; }
        .text-gradient { background: linear-gradient(to right, #ff4d6d, #ff8fa3, #ff4d6d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .polaroid { background: white; padding: 10px 10px 40px 10px; transform: rotate(-2deg); transition: all 0.3s ease; }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:hover { transform: rotate(0deg) scale(1.05); z-index: 20; }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="relative min-h-screen flex flex-col items-center justify-center text-center px-4">
        <div id="heart-container" class="absolute inset-0 pointer-events-none"></div>

        <div class="z-10">
            <h2 id="typewriter" class="text-3xl md:text-5xl font-bold mb-4 text-pink-500/80 h-12"></h2>
            <h1 class="cursive text-7xl md:text-9xl text-gradient opacity-0 translate-y-10" id="hero-name">Radhika</h1>
            <p class="mt-8 text-neutral-400 text-lg italic max-w-xl mx-auto opacity-0" id="hero-sub">
                "To the girl who makes my world brighter just by being in it. You deserve all the love today and every day."
            </p>
        </div>

        <div class="absolute bottom-10 animate-bounce opacity-0" id="scroll-hint">
            <p class="text-xs uppercase tracking-widest text-neutral-500 mb-2">Scroll for your surprise</p>
            <svg class="w-6 h-6 mx-auto text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>
    </section>

    <!-- Countdown Section -->
    <section class="py-20 px-4">
        <div class="max-w-3xl mx-auto glass p-10 rounded-3xl text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-right from-transparent via-pink-500 to-transparent"></div>
            <h3 class="text-xl tracking-widest uppercase mb-8 text-neutral-400">The Big Celebration Starts In</h3>
            <div id="countdown" class="grid grid-cols-4 gap-4 md:gap-8">
                <div class="flex flex-col"><span id="days" class="text-4xl md:text-6xl font-light text-white">00</span><span class="text-[10px] uppercase tracking-tighter text-pink-500 mt-2 font-bold">Days</span></div>
                <div class="flex flex-col"><span id="hours" class="text-4xl md:text-6xl font-light text-white">00</span><span class="text-[10px] uppercase tracking-tighter text-pink-500 mt-2 font-bold">Hours</span></div>
                <div class="flex flex-col"><span id="minutes" class="text-4xl md:text-6xl font-light text-white">00</span><span class="text-[10px] uppercase tracking-tighter text-pink-500 mt-2 font-bold">Mins</span></div>
                <div class="flex flex-col"><span id="seconds" class="text-4xl md:text-6xl font-light text-white">00</span><span class="text-[10px] uppercase tracking-tighter text-pink-500 mt-2 font-bold">Secs</span></div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="py-20 px-4 max-w-6xl mx-auto">
        <h2 class="cursive text-5xl text-center mb-16 text-gradient">Capturing Radhika</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 px-8">
            <!-- PHOTO SLOTS: These look for the 'images' folder -->
            <div class="polaroid shadow-xl"><img src="images/pic1.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
            <div class="polaroid shadow-xl"><img src="images/pic2.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
            <div class="polaroid shadow-xl"><img src="images/pic3.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
            <div class="polaroid shadow-xl"><img src="images/pic4.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
            <div class="polaroid shadow-xl"><img src="images/pic5.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
            <div class="polaroid shadow-xl"><img src="images/pic6.jpg" alt="Radhika" class="w-full h-64 object-cover"></div>
        </div>
    </section>

    <!-- Love Note -->
    <footer class="py-32 text-center px-4 bg-gradient-to-t from-pink-900/10 to-transparent">
        <div class="max-w-2xl mx-auto">
            <p class="cursive text-4xl text-pink-400 mb-4">I love you, Radhika.</p>
            <p class="text-neutral-500 text-sm">Forever & Always ❤️</p>
        </div>
    </footer>

    <script>
        // 1. Typewriter
        const text = "Happy Birthday,";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            } else {
                gsap.to("#hero-name", { opacity: 1, y: 0, duration: 1.5, ease: "back.out(1.7)" });
                gsap.to("#hero-sub", { opacity: 1, duration: 2, delay: 0.5 });
                gsap.to("#scroll-hint", { opacity: 1, delay: 1 });
            }
        }

        // 2. Floating Hearts
        function createHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart text-xl';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '105vh';
            heart.style.opacity = Math.random();
            container.appendChild(heart);

            gsap.to(heart, {
                y: '-110vh',
                x: (Math.random() - 0.5) * 300,
                rotation: Math.random() * 360,
                duration: 6 + Math.random() * 4,
                ease: "none",
                onComplete: () => heart.remove()
